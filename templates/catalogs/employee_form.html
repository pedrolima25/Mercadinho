{% extends "base.html" %}
{% block title %}{{ 'Editar' if item else 'Novo' }} Funcionário{% endblock %}
{% block content %}
<div class="d-flex align-items-center mb-4 gap-3">
  <a href="/funcionarios" class="btn btn-outline-secondary"><i class="bi bi-arrow-left"></i></a>
  <h4 class="fw-bold mb-0">{{ 'Editar Funcionário' if item else 'Novo Funcionário' }}</h4>
</div>
<div class="row justify-content-center"><div class="col-md-7">
  <div class="card border-0 shadow-sm">
    <div class="card-body">
      <form method="post" action="{{ '/funcionarios/' + item.id|string + '/editar' if item else '/funcionarios/novo' }}">
        <div class="row g-3">
          <div class="col-md-8"><label class="form-label fw-semibold">Nome *</label><input type="text" name="name" class="form-control" value="{{ item.name if item else '' }}" required></div>
          <div class="col-md-4"><label class="form-label fw-semibold">CPF</label><input type="text" name="cpf" class="form-control" value="{{ item.cpf or '' if item else '' }}"></div>
          <div class="col-md-6"><label class="form-label fw-semibold">Email</label><input type="email" name="email" class="form-control" value="{{ item.email or '' if item else '' }}"></div>
          <div class="col-md-6"><label class="form-label fw-semibold">Telefone</label><input type="text" name="phone" class="form-control" value="{{ item.phone or '' if item else '' }}"></div>
          <div class="col-md-6"><label class="form-label fw-semibold">Cargo</label><input type="text" name="position" class="form-control" value="{{ item.position or '' if item else '' }}" placeholder="Ex: Gerente, Caixa..."></div>
          <div class="col-md-6"><label class="form-label fw-semibold">Salário (R$)</label><input type="number" name="salary" class="form-control" step="0.01" min="0" value="{{ item.salary if item and item.salary else '' }}"></div>
          <div class="col-md-6"><label class="form-label fw-semibold">Data de Admissão</label><input type="date" name="hire_date" class="form-control" value="{{ item.hire_date.isoformat() if item and item.hire_date else '' }}"></div>
          <div class="col-md-6"><label class="form-label fw-semibold">Usuário do Sistema</label>
            <select name="user_id" class="form-select"><option value="">— Nenhum —</option>{% for u in users %}<option value="{{ u.id }}" {% if item and item.user_id == u.id %}selected{% endif %}>{{ u.username }}</option>{% endfor %}</select>
          </div>
        </div>
        <div class="mt-4"><button type="submit" class="btn btn-primary w-100 fw-semibold"><i class="bi bi-check-lg me-1"></i>Salvar</button></div>
      </form>
    </div>
  </div>
</div></div>
{% endblock %}
