<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - {{ request.app.state.market_name }}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <style>
    body { background: linear-gradient(135deg, #1a3a5c 0%, #0d6efd 100%); min-height: 100vh; display:flex; align-items:center; justify-content:center; }
    .login-card { background: white; border-radius: 16px; padding: 2.5rem; width: 100%; max-width: 420px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
    .login-logo { background: linear-gradient(135deg, #1a3a5c, #0d6efd); color: white; border-radius: 12px; width: 64px; height: 64px; display:flex; align-items:center; justify-content:center; margin: 0 auto 1.5rem; padding: 8px; }
    .login-logo img { width: 100%; height: 100%; object-fit: contain; border-radius: 8px; background: #fff; padding: 4px; }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-logo"><img src="{{ request.app.state.market_logo_url }}" alt=""></div>
    <h4 class="text-center fw-bold mb-1">{{ request.app.state.market_name }}</h4>
    <p class="text-center text-muted mb-4">Sistema de Gestão</p>
    {% if error %}
    <div class="alert alert-danger">{{ error }}</div>
    {% endif %}
    <form method="post" action="/login">
      <div class="mb-3">
        <label class="form-label fw-semibold">Usuário</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-person"></i></span>
          <input type="text" name="username" class="form-control" placeholder="nome de usuário" required autofocus>
        </div>
      </div>
      <div class="mb-4">
        <label class="form-label fw-semibold">Senha</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-lock"></i></span>
          <input type="password" name="password" class="form-control" placeholder="••••••••" required>
        </div>
      </div>
      <button type="submit" class="btn btn-primary w-100 py-2 fw-semibold">
        <i class="bi bi-box-arrow-in-right me-2"></i>Entrar
      </button>
    </form>
    <p class="text-center text-muted mt-3 small">Usuário padrão: <strong>admin</strong> / <strong>admin123</strong></p>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
