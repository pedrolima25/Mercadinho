name: Build Electron PDV

on:
  push:
    branches: [main]
    paths:
      - 'electron/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: electron

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: electron/package-lock.json

      - name: Instalar dependencias
        run: npm ci

      - name: Build PDV Windows
        run: npm run build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload portable exe
        uses: actions/upload-artifact@v4
        with:
          name: MercadinhoPDV-portable
          path: electron/dist/MercadinhoPDV-portable.exe
          retention-days: 30

      - name: Upload zip com pasta
        uses: actions/upload-artifact@v4
        with:
          name: MercadinhoPDV-zip
          path: electron/dist/*.zip
          retention-days: 30
