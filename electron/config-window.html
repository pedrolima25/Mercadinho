<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Configurações</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f8f9fa; padding: 28px; color: #1e293b; }
  h2 { font-size: 1.1rem; font-weight: 700; margin-bottom: 4px; }
  p.sub { font-size: 0.78rem; color: #64748b; margin-bottom: 20px; }
  label { display: block; font-size: 0.82rem; font-weight: 600; margin-bottom: 4px; margin-top: 14px; }
  input, select { width: 100%; padding: 9px 12px; border: 1.5px solid #e2e8f0; border-radius: 8px; font-size: 0.9rem; outline: none; }
  input:focus, select:focus { border-color: #1e3a8a; }
  small { font-size: 0.72rem; color: #94a3b8; margin-top: 3px; display: block; }
  button { margin-top: 22px; width: 100%; padding: 11px; background: #1e3a8a; color: #fff; border: none; border-radius: 8px; font-size: 0.95rem; font-weight: 700; cursor: pointer; }
  button:hover { background: #1e40af; }
  #msg { margin-top: 10px; font-size: 0.78rem; color: #16a34a; text-align: center; display: none; }
</style>
</head>
<body>
<h2>Configurações — Mercadinho PDV</h2>
<p class="sub">Configure o endereço do servidor e a impressora padrão.</p>

<label>Endereço do servidor</label>
<input type="text" id="serverUrl" placeholder="http://IP_DO_SERVIDOR:8001">
<small>Ex: http://192.168.1.10:8001 ou http://meudominio.com.br</small>

<label>Impressora padrão (para impressão automática)</label>
<select id="printerName"><option value="">— Carregando impressoras... —</option></select>
<small>Selecione a impressora térmica usada pelo caixa.</small>

<button onclick="salvar()">Salvar e conectar</button>
<div id="msg">✔ Salvo! Conectando ao servidor...</div>

<script>
async function init() {
  const cfg = await window.electronAPI.getConfig();
  document.getElementById('serverUrl').value = cfg.serverUrl || '';

  const printers = await window.electronAPI.getPrinters();
  const sel = document.getElementById('printerName');
  sel.innerHTML = '<option value="">Nenhuma (imprimir via diálogo)</option>';
  printers.forEach(p => {
    const opt = document.createElement('option');
    opt.value = p.name;
    opt.textContent = p.name;
    if (p.name === cfg.printerName) opt.selected = true;
    sel.appendChild(opt);
  });
}

async function salvar() {
  const cfg = {
    serverUrl: document.getElementById('serverUrl').value.trim() || 'http://localhost:8001',
    printerName: document.getElementById('printerName').value,
  };
  document.getElementById('msg').style.display = 'block';
  await window.electronAPI.saveConfig(cfg);
}

init();
</script>
</body>
</html>
